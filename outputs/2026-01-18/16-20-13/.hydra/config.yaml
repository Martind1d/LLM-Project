sp_model_path: ./data/tokenizer/spm_en_sv_32k.model
hf_name: opus100
hf_config: en-sv
src_lang: en
tgt_lang: sv
unk_id: 0
bos_id: 1
eos_id: 2
pad_id: 3
vocab_size: 32000
max_len: 200
batch_size: 64
num_workers: 4
epochs: 2
lr: 0.0003
label_smoothing: 0.1
grad_clip: 1.0
warmup_steps: 4000
min_lr_ratio: 0.1
amp: true
d_model: 512
nhead: 8
enc_layers: 6
dec_layers: 6
ffn_dim: 2048
dropout: 0.1
save_dir: checkpoints/en-sv/
log_dir: logs/en-sv/
log_interval: 100
save_interval: 1000
